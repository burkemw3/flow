<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Flow — Settings</title>
  <link rel="stylesheet" href="flow.css">
  <link rel="manifest" href="manifest.webmanifest">
</head>
<body>
  <header class="topbar">
    <a href="index.html" class="hamburger" aria-label="Back to app">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </a>
  </header>

  <main class="content">
    <div class="number-wrap">
      <h2 style="font-size:1.6rem;margin-bottom:18px;color:#cbd5e1">Settings</h2>
      <form id="settings-form">
        <div style="display:flex;flex-direction:column;gap:12px;align-items:center;">
          <label style="width:100%;max-width:360px;text-align:left;color:#cbd5e1">Current Balance
            <input id="currentBalance" type="number" step="0.01" inputmode="decimal" placeholder="Current balance" style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:transparent;color:inherit;margin-top:6px">
          </label>

          <label style="width:100%;max-width:360px;text-align:left;color:#cbd5e1">Daily Accrual
            <input id="dailyAccrual" type="number" step="0.01" inputmode="decimal" placeholder="Daily accrual" style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:transparent;color:inherit;margin-top:6px">
          </label>

          <div style="width:100%;max-width:360px;text-align:left;color:#94a3b8;font-size:0.9rem;margin-top:6px">
            Last Accrual: <span id="lastAccrualDisplay">—</span>
          </div>

          <div style="display:flex;gap:12px">
            <button type="submit" id="save-btn" class="buy">Save</button>
            <a href="index.html" class="buy" style="display:inline-flex;align-items:center;justify-content:center;text-decoration:none">Cancel</a>
          </div>
        </div>
      </form>
    </div>
  </main>

  <script src="settings.js"></script>
</body>
</html>
